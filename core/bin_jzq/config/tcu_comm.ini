[Comm]
# NYC comm module config example.
# Put these keys into the runtime config file loaded by tcu_comm.

# Local pile/concentrator identity.
# cdz_no is kept as fallback identity.
#对于nyc该项无用
cdz_no=46010003275590

# NYC frame charger address, one byte, decimal or 0xXX.
charger_addr=1

# asset_code is used by 01H request and 02H device-auth plaintext.
# 02H plaintext before RSA:
#   AES key, 16 bytes
#   asset_code length, 1 byte
#   asset_code bytes, English letters and digits
# Protocol examples allow 16/24/32 bytes; keep the value within 255 bytes.
#资产码
asset_code=4601000327559001

# Gun count managed by this comm process.
gun_count=11

# NYC master TCP endpoint.
master_host=127.0.0.1
master_port=9000
tcp_reconnect_sec=3
tcp_heartbeat_sec=30
login_retry_sec=10

# Optional cached platform RSA public key.
# 01H public-key response may update this value at runtime.
# Supported formats: PKCS#1 RSA PUBLIC KEY PEM, hex PKCS#1 DER, or raw 128-byte modulus hex.
rsa_public_key=

# MQTT endpoint used to communicate with local modules.
mqtt_host=192.168.2.88
mqtt_port=1883
mqtt_keepalive=60
mqtt_client_id=tcu_comm_nyc
mqtt_topic_prefix=tcu
mqtt_username=
mqtt_password=
bias_no=0
# 1 allows local/offline run when platform TCP is not connected.
offline_run_mode=0

# 1 prints TCP frame hex for integration debugging.
debug=0
