[Hmi]
# BY ZF: 固定屏幕分辨率
screen_width=800
screen_height=480
fullscreen=1

# BY ZF: 默认显示枪数量（收到 setConfig 后会动态覆盖）
gun_count=1

# BY ZF: MQTT 配置
mqtt_host=192.168.1.88
mqtt_port=1883
mqtt_keepalive=60
mqtt_client_id=tcu_hmi1
mqtt_topic_prefix=tcu
bias_no=0
mqtt_username=
mqtt_password=

# BY ZF: C6 鉴权页入口开关，默认仅保留扫码入口
enable_merge_charge_entry=0
enable_vin_entry=0
# BY ZF: 是否显示扫码二维码入口（1=显示二维码，0=隐藏二维码）
enable_qr_entry=0
# BY ZF: 是否显示刷卡启动入口（1=显示刷卡按钮，0=隐藏）
enable_card_entry=1
# BY ZF: 刷卡放电使能（1=刷卡入口显示充电/放电互斥选择，0=仅刷卡充电）
enable_card_discharge=1
# BY ZF: 刷卡模式鉴权方式（1=在线鉴权，0=离线鉴权），修改后需重启 HMI 生效
card_online_auth=0
