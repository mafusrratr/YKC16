[Comm]
# BY ZF: YuanyangV2 runtime config example.
gun_count=2

# BY ZF: Yuanyang platform TCP endpoint.
master_host=127.0.0.1
master_port=9000
tcp_reconnect_sec=3
tcp_heartbeat_sec=20
login_retry_sec=10

# BY ZF: NBT33007 4-byte address. This follows NYC-style asset_code config.
# BY ZF: Low 16 bits are station/concentrator address, high 16 bits are device address.
# BY ZF: Example 0x00010002 means station_addr=2, device_addr=1.
asset_code=0x00010002
# BY ZF: Optional per-gun override. If omitted, gunN_device_addr remains compatible fallback.
gun1_asset_code=0x00010002
gun2_asset_code=0x00020002
station_addr=2
gun1_device_addr=1
gun2_device_addr=2

# BY ZF: Optional cached platform RSA public key.
# Supported formats: PEM, DER hex, or raw 128/256-byte modulus hex.
rsa_public_key=

# BY ZF: MQTT endpoint.
mqtt_host=127.0.0.1
mqtt_port=1883
mqtt_keepalive=60
mqtt_client_id=tcu_comm_yuanyang_v2
mqtt_topic_prefix=tcu
bias_no=0
mqtt_username=
mqtt_password=

# BY ZF: 1 keeps internal platform event online without real platform.
offline_run_mode=0

# BY ZF: 1 prints TCP frame hex.
debug=0
