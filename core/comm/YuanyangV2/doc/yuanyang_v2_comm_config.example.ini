[Comm]
# BY ZF: YuanyangV2 runtime config example.
gun_count=2

# BY ZF: Yuanyang platform TCP endpoint.
master_host=39.100.66.103
master_port=2409
tcp_reconnect_sec=3
tcp_heartbeat_sec=20
login_retry_sec=10

# BY ZF: Station/concentrator asset code, parsed as decimal by default.
# BY ZF: Example 012345 is converted to station address 12345. Gun device address defaults to gun number.
asset_code=1243

# BY ZF: Optional cached platform RSA public key.
# Supported formats: PEM, DER hex, or raw 128/256-byte modulus hex.
rsa_public_key=

# BY ZF: MQTT endpoint.
mqtt_host=127.0.0.1
mqtt_port=1883
mqtt_keepalive=60
mqtt_client_id=tcu_comm_yuanyang_v2
mqtt_topic_prefix=tcu
bias_no=0
mqtt_username=
mqtt_password=

# BY ZF: 1 keeps internal platform event online without real platform.
offline_run_mode=0

# BY ZF: 1 prints TCP frame hex.
debug=1
