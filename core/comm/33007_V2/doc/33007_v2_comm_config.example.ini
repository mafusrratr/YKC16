[Comm]
# BY ZF: NBT33007 V2 runtime config example.
# BY ZF: Runtime path is /usr/app/config/tcu_comm.ini.

# BY ZF: Number of charging guns handled by this communication process.
# BY ZF: Device address defaults to 1..gun_count.
gun_count=2

# BY ZF: Platform TCP server endpoint.
master_host=47.116.139.35
master_port=2409
tcp_reconnect_sec=3
tcp_heartbeat_sec=20

# BY ZF: Station/concentrator address.
# BY ZF: asset_code accepts decimal, hex, or "station:device"; station part is used.
# BY ZF: If asset_code is empty or invalid, station_addr is used.
asset_code=1410
station_addr=1410

# BY ZF: MQTT endpoint for internal modules.
mqtt_host=127.0.0.1
mqtt_port=1883
mqtt_keepalive=60
mqtt_client_id=tcu_comm_33007_v2
mqtt_topic_prefix=tcu

# BY ZF: External MQTT gun number offset.
# BY ZF: local gun index = topic gun number - bias_no.
bias_no=0

# BY ZF: Optional MQTT auth.
mqtt_username=
mqtt_password=

# BY ZF: 1 keeps internal platform event online without a real platform.
offline_run_mode=0

# BY ZF: 1 prints TCP frame hex and parsed protocol fields.
debug=1

# BY ZF: Kept only for compatibility with copied Yuanyang config files.
# BY ZF: Standard NBT33007 V2 does not use RSA/AES login or encrypted ASDU bodies.
login_retry_sec=10
rsa_public_key=
