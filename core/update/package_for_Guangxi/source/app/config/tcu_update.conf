[General]
# ============================================
# TCU 升级程序配置文件
# ============================================
# 
# 说明：
# 1. 此文件应放置在目标设备的 /usr/app/config/ 目录下
# 2. 文件名必须为：tcu_update.conf
# 3. 如果配置文件不存在，程序将使用默认值
# 4. 修改配置后需要重启程序才能生效
#
# ============================================

# 备份目录路径
# 说明：所有备份文件将保存在此目录下
# 格式：backup_YYYYMMDD_HHMMSS/
# 默认值：/mnt/nandflash/ota_back
# 注意：确保此目录有足够的写入权限和空间
backup_dir=/mnt/nandflash/ota_back

# 临时解压目录路径
# 说明：升级包解压的临时目录
# 默认值：/tmp/tcu_update_extract
# 注意：此目录在更新完成后会自动清理
temp_dir=/tmp/tcu_update_extract

# 日志文件路径
# 说明：程序运行日志（错误和警告）保存位置
# 默认值：/var/log/tcu_update.log
# 注意：确保日志目录存在且有写入权限
log_file=/var/log/tcu_update.log

# 备份保留数量
# 说明：保留最近N次备份，超过数量的旧备份将被自动删除
# 默认值：3
# 范围：1-10（建议值）
# 注意：设置为0表示不自动删除备份（不推荐）
backup_keep_count=3

# 磁盘空间安全余量百分比
# 说明：在计算所需磁盘空间时，额外保留的百分比
# 默认值：10
# 范围：5-30（建议值）
# 示例：10 表示保留10%的额外空间
# 注意：此值用于确保系统有足够的缓冲空间
disk_space_margin_percent=10

# 状态文件路径
# 说明：更新状态标志文件路径
# 默认值：/usr/app/data/update_status.flag
# 格式：简单INI格式，包含STATUS、PACKAGE_PATH、TIMESTAMP
# 状态值：UPDATING（更新中，包括回滚）、UPDATED（更新完成，包括回滚完成）、ERROR（错误）
# 注意：确保目录存在且有写入权限
status_file=/usr/app/data/update_status.flag

