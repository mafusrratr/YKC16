[Meter]
# 枪数量（按 gun1/gun2/... 配置）
gun_count=2

# 每枪电表地址与串口（serial_device 必填，且不同枪不能重复）
gun1_meter_addr=523001000001
gun1_serial_device=/dev/ttyS3
gun1_serial_baudrate=38400
gun1_serial_data_bits=8
gun1_serial_stop_bits=1
gun1_serial_parity=E
gun1_read_timeout_ms=1500

# 多枪示例
gun2_meter_addr=523001000002
gun2_serial_device=/dev/ttyS3
gun2_serial_baudrate=38400
gun2_serial_data_bits=8
gun2_serial_stop_bits=1
gun2_serial_parity=E
gun2_read_timeout_ms=1500

gun3_meter_addr=510710000368
gun3_serial_device=/dev/ttyS3
gun3_serial_baudrate=2400
gun3_serial_data_bits=8
gun3_serial_stop_bits=1
gun3_serial_parity=E
gun3_read_timeout_ms=500

gun4_meter_addr=510710000368
gun4_serial_device=/dev/ttyS3
gun4_serial_baudrate=2400
gun4_serial_data_bits=8
gun4_serial_stop_bits=1
gun4_serial_parity=E
gun4_read_timeout_ms=500


# MQTT 配置
mqtt_host=127.0.0.1
mqtt_port=1883
mqtt_keepalive=60
mqtt_client_id=tcu_meter
mqtt_topic_prefix=tcu

# 轮询与重试参数
poll_interval_ms=1500
read_timeout_ms=1500
retry_count=3

# 645 收发调试（1=开启，0=关闭）
debug_645=0
