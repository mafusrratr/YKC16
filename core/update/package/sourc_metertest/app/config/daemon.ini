# 守护进程专用配置文件（目标设备版本）

[Daemon]
# 进程监控间隔（秒）
monitor_interval=1
# 看门狗超时时间（秒）
watchdog_timeout=30
# 进程异常重启次数限制
max_restart_count=10
# 升级文件路径
upgrade_dir=/usr/app/upgrade
# 部署目录
deploy_dir=/usr/app/tcu
# 进程可执行文件列表（逗号分隔）
# 守护进程会自动启动这些进程
process_list=tcu_logger,tcu_hmi,tcu_logic,tcu_meter,tcu_cdzctrl,tcu_comm,tcu_uploader

# BY ZF: 更新处理进程路径
update_process_path=/usr/app/tcu/tcu_update -qws
# BY ZF: 更新状态持久化文件路径
update_status_file=/usr/app/data/update_status.flag
# BY ZF: 回滚检查间隔（秒）
rollback_check_interval=10
# BY ZF: 回滚阈值时间（秒，连续此时间进程异常则触发回滚）
rollback_threshold_time=300

[ProcessPaths]
# 生产环境路径
tcu_logger=/usr/app/tcu/tcu_logger
tcu_comm=/usr/app/tcu/tcu_comm
tcu_hmi=/usr/app/tcu/tcu_hmi -qws
tcu_logic=/usr/app/tcu/tcu_logic
tcu_meter=/usr/app/tcu/tcu_meter
tcu_cdzctrl=/usr/app/tcu/tcu_cdzctrl
tcu_uploader=/usr/app/tcu/tcu_uploader /usr/app/config/tcu_uploader.ini

