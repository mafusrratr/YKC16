# 日志系统专用配置文件（目标设备版本）
# BY ZF
# 项目: project_a

[Logger]
# 日志级别 (0=DEBUG, 1=INFO, 2=WARN, 3=ERROR, 4=FATAL)
log_level=1

[Database]
# 主运行数据库路径（目标设备）
main_db_path=/mnt/nandflash/data/tcu.db
# 充电记录数据库路径（目标设备）
charge_db_path=/mnt/nandflash/data/chargerecords.db
# 计费模型数据库路径（目标设备）
fee_db_path=/mnt/nandflash/data/feemodel.db

[Backup]
# 日志数据库备份目录
backup_dir=/mnt/nandflash/data/backup
# 备份间隔（分钟，默认30天）
backup_interval_minutes=21600
# 备份检查周期（分钟，默认1小时）
backup_check_minutes=10
# 备份目录最大大小限制（MB，0表示无限制，默认0）
# BY ZF: 当备份目录总大小超过此限制时，会自动删除最旧的备份文件
backup_max_size_mb=800
