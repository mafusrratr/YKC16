# 主控通信进程配置文件
# BY ZF
# 项目: project_a
# 
# 配置说明：
# - 所有枪均采用独立配置方式，每个枪必须明确配置所有参数
# - 支持1-10枪的配置
# - 每个枪的配置项以 gun{N}_ 开头（N为枪号，从1开始）
# - 根据通信方式（comm_type）配置对应的参数
# - 协议参数（packet_timeout、retry_count）为全局配置，所有枪共用

[PileController]
# 充电枪数量（1-10）
gun_count=2

# 全局协议参数（所有枪共用）
packet_timeout=10
retry_count=3

# ========== MQTT 配置 ==========
# 不使用用户名/密码（匿名连接）
mqtt_host=192.168.1.88
mqtt_port=1883
mqtt_keepalive=60
mqtt_client_id=pile_controller
# 主题前缀（默认 tcu）
mqtt_topic_prefix=tcu

# ========== 枪1配置（gun_no=1，CAN通信 + CAN2CCU规约）==========
gun1_comm_type=can
gun1_device_path=can0
gun1_baudrate=250000
gun1_protocol_type=can2ccu
gun1_bcu_addr=0x8A
gun1_cdz_addr=0xE0
# 充电桩编号（BCD 7字节，14位十六进制）
gun1_pile_id=58050010904022

; # ========== 枪2配置（gun_no=2，CAN通信 + CAN2CCU规约）==========
