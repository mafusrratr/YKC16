[Comm]
# BY ZF: 充电桩通讯地址（MODBUS从站地址，范围1~16）
cdz_no=1

# BY ZF: 枪数量
# BY ZF: 当前 Modbus 协议按单枪寄存器映射，使用 modbus_export_gun 选择映射枪
gun_count=1
modbus_export_gun=0

# BY ZF: MQTT broker
mqtt_host=127.0.0.1
mqtt_port=1883
mqtt_keepalive=60
mqtt_client_id=tcu_comm
mqtt_topic_prefix=tcu
mqtt_username=
mqtt_password=

# BY ZF: 统一调试开关（与常州/中石化一致）
debug=1
