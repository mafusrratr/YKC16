[Card]
# BY ZF: 串口配置
serial_device=/dev/ttyS5
serial_baudrate=57600
serial_data_bits=8
serial_stop_bits=1
serial_parity=N
read_timeout_ms=2000

# BY ZF: MQTT 配置
mqtt_host=192.168.1.88
mqtt_port=1883
mqtt_keepalive=60
mqtt_client_id=tcu_card
mqtt_topic_prefix=tcu

# BY ZF: 可选显式 Topic，未配置时自动使用 tcu/card/0/*
cmd_topic=tcu/card/0/cmd
event_topic=tcu/card/0/event

# BY ZF: 运行参数
# 主循环周期和队列深度由程序内部固定
debug_protocol=0
