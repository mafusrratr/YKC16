[Hmi]
# BY ZF: 固定屏幕分辨率
screen_width=800
screen_height=480
fullscreen=1

# BY ZF: 默认显示枪数量（收到 setConfig 后会动态覆盖）
gun_count=2

# BY ZF: MQTT 配置
mqtt_host=127.0.0.1
mqtt_port=1883
mqtt_keepalive=60
mqtt_client_id=tcu_hmi
mqtt_topic_prefix=tcu
mqtt_username=
mqtt_password=

# C6 鉴权页入口开关，默认仅保留扫码入口
#合并冲启动按钮
enable_merge_charge_entry=0
#即插即充按钮
enable_vin_entry=0
# 扫码二维码入口（1=显示二维码，0=隐藏二维码）
enable_qr_entry=1
# 刷卡启动入口（1=显示刷卡按钮，0=隐藏）
enable_card_entry=0
# 刷卡模式鉴权方式（1=在线鉴权，0=离线鉴权），修改后需重启
card_online_auth=0
# 广东地区语音播报开关（1=开启，0=关闭）
guangdong_wavplay=0
