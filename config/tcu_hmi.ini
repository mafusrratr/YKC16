[Hmi]
# BY ZF: 固定屏幕分辨率
screen_width=800
screen_height=480
fullscreen=1

# BY ZF: 默认显示枪数量（收到 setConfig 后会动态覆盖）
gun_count=1

# BY ZF: MQTT 配置
mqtt_host=192.168.1.88
mqtt_port=1883
mqtt_keepalive=60
mqtt_client_id=tcu_hmi
mqtt_topic_prefix=tcu
mqtt_username=
mqtt_password=

# BY ZF: C6 鉴权页入口开关，默认仅保留扫码入口
enable_merge_charge_entry=0
enable_vin_entry=0
enable_card_entry=0
