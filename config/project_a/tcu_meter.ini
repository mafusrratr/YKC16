[Meter]
# BY ZF: gun config
gun_count=1
gun1_meter_addr=000000000001
gun1_serial_device=/dev/ttyS1
# gun1_serial_baudrate=9600
# gun1_serial_data_bits=8
# gun1_serial_stop_bits=1
# gun1_serial_parity=E
# gun1_read_timeout_ms=200

# BY ZF: rs485 serial default config（按枪可覆盖，设备号按枪必填）
serial_baudrate=9600
serial_data_bits=8
serial_stop_bits=1
serial_parity=E

# BY ZF: mqtt config
mqtt_host=127.0.0.1
mqtt_port=1883
mqtt_keepalive=60
mqtt_client_id=tcu_meter
mqtt_topic_prefix=tcu

# BY ZF: runtime poll config
poll_interval_ms=500
read_timeout_ms=200
retry_count=2
