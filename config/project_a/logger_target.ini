# 日志系统专用配置文件（目标设备版本）
# BY ZF
# 项目: project_a

[Logger]
# 日志级别 (0=DEBUG, 1=INFO, 2=WARN, 3=ERROR, 4=FATAL)
log_level=1
# 日志文件路径
log_file=/usr/app/data/logs/tcu.log
# 日志文件最大大小（MB）
max_log_size=100
# 日志保留天数
log_keep_days=30
# 日志轮转方式 (size/time/both)
rotation_mode=both
# 日志格式 (simple/detailed/json)
log_format=detailed
# 缓冲区最大大小
max_buffer_size=1000
# 刷新间隔（秒）
flush_interval=5

[Database]
# 主运行数据库路径（目标设备）
main_db_path=/usr/app/data/tcu.db
# 充电记录数据库路径（目标设备）
charge_db_path=/usr/app/data/chargerecords.db
# 计费模型数据库路径（目标设备）
fee_db_path=/usr/app/data/feemodel.db
# 数据库备份路径（目标设备）
backup_dir=/usr/app/data/backup
# 数据库连接池大小
connection_pool_size=5
# 数据库自动备份间隔（小时）
backup_interval=24

[MessageQueue]
# 日志消息队列Key（硬编码在代码中）
# log_queue_key=0x1235

[Performance]
# 性能监控间隔（秒）
monitor_interval=60
# 内存使用阈值（MB）
memory_threshold=512
# CPU使用阈值（%）
cpu_threshold=80

