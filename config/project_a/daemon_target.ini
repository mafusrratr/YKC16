# 守护进程专用配置文件（目标设备版本）
# BY ZF
# 项目: project_a

[Daemon]
# 进程监控间隔（秒）
monitor_interval=1
# 看门狗超时时间（秒）
watchdog_timeout=30
# 进程异常重启次数限制
max_restart_count=10
# 升级文件路径
upgrade_dir=/usr/app/upgrade
# 部署目录
deploy_dir=/usr/app/tcu
# 进程可执行文件列表（逗号分隔）
# 守护进程会自动启动这些进程
process_list=tcu_logger,test_process

[ProcessPaths]
# 各进程的可执行文件路径（目标设备）
# BY ZF: 支持在路径后直接添加启动参数，用空格分隔
# 例如: tcu_display=/usr/app/tcu/tcu_display -qws
test_process=/usr/app/tcu/test_process
tcu_logger=/usr/app/tcu/tcu_logger
# 生产环境路径
tcu_charge_logic=/usr/app/tcu/tcu_charge_logic
tcu_meter=/usr/app/tcu/tcu_meter
tcu_pile_controller=/usr/app/tcu/tcu_pile_controller
tcu_platform=/usr/app/tcu/tcu_platform
# BY ZF: 示例：带参数的进程启动（Qt应用需要-qws参数）
tcu_display=/usr/app/tcu/tcu_display -qws

[System]
# 工作目录
work_dir=/usr/app
# monitor目录
mon_dir=/usr/app/mon
# 数据目录
data_dir=/usr/app/data

