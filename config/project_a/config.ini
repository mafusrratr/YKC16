# TCU充电桩计费单元配置文件
# BY ZF
# 项目: project_a

[System]
# 工作目录
work_dir=/usr/app
# monitor目录
mon_dir=/usr/app/mon
# 数据目录
data_dir=/usr/app/data

[Database]
# 数据库文件路径
db_path=/usr/app/data/tcu.db
# 数据库备份路径
backup_dir=/usr/app/data/backup

[SharedMemory]
# 共享内存Key
shm_key=85000
# 端口数量
port_count=2

[MessageQueue]
# 消息队列配置说明：
# 消息队列Key在代码中硬编码定义，无需在此配置
# MSG_KEY_CMD=0x1234, MSG_KEY_LOG=0x1235, MSG_KEY_EVENT=0x1236
# MSG_KEY_SYSTEM=0x1237, MSG_KEY_WATCHDOG=0x1238

[Daemon]
# 进程监控间隔（秒）
monitor_interval=1
# 看门狗超时时间（秒）
watchdog_timeout=30
# 进程异常重启次数限制
max_restart_count=10
# 升级文件路径
upgrade_dir=/usr/app/upgrade
# 部署目录
deploy_dir=/Users/seear/embedded_codes/01_TCU_Program/2510_RefactorProject/core/daemon
# 进程可执行文件列表（逗号分隔）
# 守护进程会自动启动这些进程
process_list=test_process

[Charge]
# 充电枪数量
gun_count=2
# 默认充电模式
default_charge_mode=1
# 协议支持 (v2g/evs/both)
# v2g: 仅使用V2G协议（充放电监控）
# evs: 仅使用EVS协议（交易结算）
# both: 同时使用两套协议（推荐，数据不冲突，互补使用）
protocol_support=both

[Meter]
# 电表类型 (1=DC直流, 2=AC交流, 3=Dual交直流)
meter_type=3
# 计量更新间隔（秒）
update_interval=1

[PileController]
# 通信方式 (can/485/shm/tcp/udp)
comm_type=can
# 设备路径（can/485/sh necessity_tcp用）
device_path=/dev/can0
# 波特率（can/485用）
baudrate=250000
# 网络地址（tcp/udp用）
#ip=192.168.1.200
# 网络端口（tcp/udp用）
#port=5000
# 心跳间隔（秒）
heartbeat_interval=3

[Platform]
# 通信类型 (tcp/udp/mqtt/485)
comm_type=tcp
# 服务器地址
server_ip=192.168.1.100
# 服务器端口
server_port=8080
# 连接超时（秒）
connect_timeout=10
# 心跳间隔（秒）
heartbeat_interval=30

[Logger]
# 日志级别 (0=DEBUG, 1=INFO, 2=WARN, 3=ERROR, 4=FATAL)
log_level=1
# 日志文件路径
log_file=/usr/app/data/logs/tcu.log
# 日志文件最大大小（MB）
max_log_size=100
# 日志保留天数
log_keep_days=30
