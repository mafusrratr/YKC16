# 主控通信进程配置文件
# BY ZF
# 项目: project_a
# 
# 配置说明：
# - 所有枪均采用独立配置方式，每个枪必须明确配置所有参数
# - 支持1-10枪的配置
# - 每个枪的配置项以 gun{N}_ 开头（N为枪号，从1开始）
# - 根据通信方式（comm_type）配置对应的参数
# - 协议参数（packet_timeout、retry_count）为全局配置，所有枪共用

[PileController]
# 充电枪数量（1-10）
gun_count=4

# 全局协议参数（所有枪共用）
packet_timeout=5
retry_count=3

# ========== 枪1配置（gun_no=1，CAN通信 + CAN2CCU规约）==========
gun1_comm_type=can
gun1_device_path=can0
gun1_baudrate=250000
gun1_protocol_type=can2ccu
gun1_can_id_base=0x180

# ========== 枪2配置（gun_no=2，CAN通信 + CAN2CCU规约）==========
gun2_comm_type=can
gun2_device_path=can0
gun2_baudrate=250000
gun2_protocol_type=can2ccu
gun2_can_id_base=0x181

# ========== 枪3配置（gun_no=3，串口通信 + Modbus规约）==========
gun3_comm_type=485
gun3_device_path=/dev/ttyS1
gun3_baudrate=9600
gun3_protocol_type=modbus
gun3_modbus_address=1

# ========== 枪4配置（gun_no=4，网络通信 + UDP2CDZ规约）==========
gun4_comm_type=udp
gun4_ip=192.168.1.201
gun4_port=5001
gun4_protocol_type=udp2cdz

# ========== 枪5配置示例（gun_no=5，共享内存通信）==========
