# 计量计费专用配置文件
# BY ZF
# 项目: project_a

[Meter]
# 电表类型 (1=DC直流, 2=AC交流, 3=Dual交直流)
meter_type=3
# 计量更新间隔（秒）
update_interval=1
# 电表通信方式 (modbus/can/485)
comm_type=modbus
# 电表设备路径
device_path=/dev/ttyUSB0
# 电表波特率
baudrate=9600
# 电表地址
meter_address=1

[Billing]
# 计费模式 (time/power/energy)
billing_mode=energy
# 电价（元/kWh）
electricity_price=0.6
# 服务费（元/次）
service_fee=2.0
# 计费精度（小数位数）
billing_precision=2

[Calibration]
# 校准系数
calibration_factor=1.0
# 校准偏移
calibration_offset=0.0
# 校准间隔（小时）
calibration_interval=24


