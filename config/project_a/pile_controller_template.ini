# 主控通信进程配置文件模板
# BY ZF
# 
# 使用说明：
# 1. 复制此文件为 pile_controller.ini
# 2. 根据实际硬件配置修改各枪的参数
# 3. 确保每个枪的所有必需配置项都已填写
# 
# 配置规则：
# - gun_count: 充电枪数量（1-10）
# - 每个枪的配置项以 gun{N}_ 开头（N为枪号，从1开始）
# - 根据 comm_type 配置对应的参数：
#   * can: 需要 device_path, baudrate, can_id_base
#   * 485: 需要 device_path, baudrate, modbus_address（如果protocol_type=modbus）
#   * tcp/udp: 需要 ip, port
#   * shm: 需要 shm_key（可选）
# - 全局协议参数：packet_timeout, retry_count（所有枪共用）

[PileController]
# 充电枪数量（1-10）
gun_count=2

# 全局协议参数（所有枪共用）
packet_timeout=5
retry_count=3

# ========== 枪1配置（gun_no=1）==========
# 通信方式：can/485/tcp/udp/shm
gun1_comm_type=can
# 设备路径（can/485用）：can0, can1, /dev/ttyS1 等
gun1_device_path=can0
# 波特率（can/485用）：250000, 500000, 9600, 115200 等
gun1_baudrate=250000
# 规约类型：cdz/custom/modbus/udp2cdz/direct 等
gun1_protocol_type=cdz
# CAN ID基址（CAN通信时必需，16进制格式）
gun1_can_id_base=0x180
# 网络地址（tcp/udp用）
# gun1_ip=192.168.1.201
# 网络端口（tcp/udp用）
# gun1_port=5001
# Modbus从站地址（串口通信，protocol_type=modbus时）
# gun1_modbus_address=1
# 共享内存Key（共享内存通信时，可选）
# gun1_shm_key=85001

# ========== 枪2配置（gun_no=2）==========
gun2_comm_type=can
gun2_device_path=can0
gun2_baudrate=250000
gun2_protocol_type=cdz
gun2_can_id_base=0x181

# ========== 枪3配置示例（串口通信）==========
# gun3_comm_type=485
# gun3_device_path=/dev/ttyS1
# gun3_baudrate=9600
# gun3_protocol_type=modbus
# gun3_modbus_address=1

# ========== 枪4配置示例（UDP网络通信）==========
# gun4_comm_type=udp
# gun4_ip=192.168.1.201
# gun4_port=5001
# gun4_protocol_type=udp2cdz

# ========== 枪5配置示例（TCP网络通信）==========
# gun5_comm_type=tcp
# gun5_ip=192.168.1.202
# gun5_port=5002
# gun5_protocol_type=tcp_custom

# ========== 枪6配置示例（共享内存通信）==========
# gun6_comm_type=shm
# gun6_protocol_type=direct
# gun6_shm_key=85001

# ========== 枪7-10配置（格式相同，按需添加）==========
# gun7_comm_type=...
# gun8_comm_type=...
# gun9_comm_type=...
# gun10_comm_type=...

