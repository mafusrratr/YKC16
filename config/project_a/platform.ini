# 平台通信专用配置文件
# BY ZF
# 项目: project_a

[Platform]
# 通信类型 (tcp/udp/mqtt/485)
comm_type=tcp
# 服务器地址
server_ip=192.168.1.100
# 服务器端口
server_port=8080
# 连接超时（秒）
connect_timeout=10
# 心跳间隔（秒）
heartbeat_interval=30
# 重连间隔（秒）
reconnect_interval=10
# 最大重连次数
max_reconnect_count=5

[Authentication]
# 认证方式 (token/certificate/none)
auth_type=token
# 认证令牌
auth_token=your_token_here
# 证书路径
cert_path=/usr/app/certs/client.crt
# 私钥路径
key_path=/usr/app/certs/client.key

[DataSync]
# 数据同步间隔（秒）
sync_interval=60
# 批量上传大小
batch_size=100
# 数据压缩 (gzip/none)
compression=gzip
# 数据加密 (aes/none)
encryption=aes


