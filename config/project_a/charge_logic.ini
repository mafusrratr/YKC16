# 充电逻辑专用配置文件
# BY ZF
# 项目: project_a

[Charge]
# 充电枪数量
gun_count=2
# 默认充电模式
default_charge_mode=1
# 协议支持 (v2g/evs/both)
# v2g: 仅使用V2G协议（充放电监控）
# evs: 仅使用EVS协议（交易结算）
# both: 同时使用两套协议（推荐，数据不冲突，互补使用）
protocol_support=both
# 充电功率限制（kW）
max_power=60
# 充电电流限制（A）
max_current=100

[SharedMemory]
# 共享内存Key
shm_key=85000
# 端口数量
port_count=2
# 共享内存大小（字节）
shm_size=1048576

[Safety]
# 过流保护阈值（A）
overcurrent_threshold=120
# 过压保护阈值（V）
overvoltage_threshold=500
# 欠压保护阈值（V）
undervoltage_threshold=200


