# 主控通信进程配置文件 - 测试用
# BY ZF
# 用途：联调/测试 pile_controller、test_business_frame_from_can 等
# 
# 使用说明：
# 1. 复制为 pile_controller.ini 或在测试时指定：-c pile_controller_test.ini
# 2. 确保目标机 CAN 设备（如 can0）已配置并连接主控
# 3. BCU 地址默认 0x8A，CDZ 地址按主控配置（如 0xE0/0xE1），由程序或本配置传入
# 
# 测试用参数说明：
# - gun_count=1：单枪测试，便于观察 YX22/业务帧解析
# - bcu_addr/cdz_addr：若程序从 ini 读取，则填写；否则由程序默认（bcu=0x8A, cdz 从本节读取）
# - 双枪测试时取消 gun2 注释并设 gun_count=2

[PileController]
# 充电枪数量（测试用建议 1）
gun_count=1

# 全局协议参数（所有枪共用）
packet_timeout=5
retry_count=3

# ========== 枪1配置（测试用，CAN + CAN2CCU，与主控联调）==========
gun1_comm_type=can
gun1_device_path=can0
gun1_baudrate=250000
gun1_protocol_type=can2ccu
gun1_can_id_base=0x180
# 以下为 CAN2CCU 规约用地址（若程序从 ini 读取）
gun1_bcu_addr=0x8A
gun1_cdz_addr=0xE0

# ========== 枪2配置（双枪测试时启用，gun_count 改为 2）==========
# gun2_comm_type=can
# gun2_device_path=can0
# gun2_baudrate=250000
# gun2_protocol_type=can2ccu
# gun2_can_id_base=0x181
# gun2_bcu_addr=0x8A
# gun2_cdz_addr=0xE1

# ========== 测试用等价 config 字符串（供 test_business_frame_from_can 等直接使用）==========
# device_path=can0,baudrate=250000,bcu_addr=0x8A,cdz_addr=0xE0,gun_no=1,packet_timeout=5,retry_count=3
