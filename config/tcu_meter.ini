[Meter]
# BY ZF: 枪数量（按 gun1/gun2/... 配置）
gun_count=5

# BY ZF: 每枪电表地址与串口（serial_device 必填，且不同枪不能重复）
gun1_meter_addr=510710000368
gun1_serial_device=/dev/ttyS3
gun1_serial_baudrate=2400
gun1_serial_data_bits=8
gun1_serial_stop_bits=1
gun1_serial_parity=E
gun1_read_timeout_ms=500

# BY ZF: 多枪示例
gun2_meter_addr=100301000776
gun2_serial_device=/dev/ttyS3
gun2_serial_baudrate=2400
gun2_serial_data_bits=8
gun2_serial_stop_bits=1
gun2_serial_parity=E
gun2_read_timeout_ms=500

gun3_meter_addr=510710000368
gun3_serial_device=/dev/ttyS3
gun3_serial_baudrate=2400
gun3_serial_data_bits=8
gun3_serial_stop_bits=1
gun3_serial_parity=E
gun3_read_timeout_ms=500

gun4_meter_addr=510710000368
gun4_serial_device=/dev/ttyS3
gun4_serial_baudrate=2400
gun4_serial_data_bits=8
gun4_serial_stop_bits=1
gun4_serial_parity=E
gun4_read_timeout_ms=500

gun5_meter_addr=510710000368
gun5_serial_device=/dev/ttyS3
gun5_serial_baudrate=2400
gun5_serial_data_bits=8
gun5_serial_stop_bits=1
gun5_serial_parity=E
gun5_read_timeout_ms=500

# BY ZF: 全局默认串口参数（设备号不支持全局，必须按枪配置）
; serial_baudrate=9600
; serial_data_bits=8
; serial_stop_bits=1
; serial_parity=E

# BY ZF: MQTT 配置
mqtt_host=192.168.1.88
mqtt_port=1883
mqtt_keepalive=60
mqtt_client_id=tcu_meter
mqtt_topic_prefix=tcu

# BY ZF: 轮询与重试参数
poll_interval_ms=500
read_timeout_ms=500
retry_count=3

# BY ZF: 645 收发调试（1=开启，0=关闭）
debug_645=0
