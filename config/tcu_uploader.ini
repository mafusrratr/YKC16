[Upload]
enabled=1
upload_url=http://43.142.89.201:8080/api/device/log/upload
token=test-token-001
# 自动打包上传周期，单位分钟；1440 表示每天一次
interval_minutes=2
# 启动后延迟执行，避免系统刚启动时数据库和网络未就绪
startup_delay_seconds=120
fallback_device_id=tcu_test_002

[MQTT]
mqtt_host=127.0.0.1
mqtt_port=1883
mqtt_keepalive=60
mqtt_client_id=tcu_uploader
mqtt_topic_prefix=tcu

[Paths]
data_dir=/mnt/nandflash/data
work_dir=/mnt/nandflash/data/upload
include_files=tcu.db,error.db,feemodel.db,chargerecords.db,telemetry.db

[Retry]
max_retry_per_round=3
connect_timeout_seconds=15
max_time_seconds=300
# pending 目录最大容量，超过后删除旧包，优先保留新包
max_pending_mb=200
